<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte GFC - Santuario de Dios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; margin: 0; min-height: 100vh; }
        
        .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #020617; overflow: hidden; }
        .glow-1 { position: absolute; width: 600px; height: 600px; background: #1e1b4b; filter: blur(120px); opacity: 0.4; top: -10%; left: -10%; animation: move 20s infinite alternate; }
        .glow-2 { position: absolute; width: 500px; height: 500px; background: #3b82f6; filter: blur(120px); opacity: 0.15; bottom: -10%; right: -10%; animation: move 15s infinite alternate-reverse; }
        @keyframes move { from { transform: translate(-10%, -10%) rotate(0deg); } to { transform: translate(20%, 20%) rotate(10deg); } }
        
        .glass { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        select option { background-color: #0f172a; color: white; }
        
        /* Estilos para el scrollbar de la lista de reportes */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="text-white p-4 pb-12">
    <div class="aurora">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="max-w-2xl mx-auto glass p-8 rounded-[40px] shadow-2xl mt-5">
        
        <div class="text-center mb-8">
            <div class="relative inline-block mb-4">
                <div class="absolute inset-0 bg-blue-500 blur-3xl opacity-30 rounded-full"></div>
                <img src="https://i.ibb.co/mC64j5T6/Adobe-Express-file-1.png" class="relative w-24 h-24 mx-auto object-contain drop-shadow-2xl">
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter italic leading-none">Santuario de Dios</h1>
            <p class="text-blue-400 text-[10px] font-black tracking-[0.3em] uppercase opacity-80 mt-2">Reporte Digital de G.F.C</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-slate-900/40 p-5 rounded-[30px] border border-white/5">
            <div>
                <div class="flex justify-between items-end mb-1 ml-1">
                    <label class="block text-[10px] text-blue-300 uppercase font-bold">Nombre del Líder</label>
                    <button onclick="editarMiUltimoReporte()" class="text-[9px] text-yellow-400 hover:text-yellow-300 font-bold uppercase tracking-wider transition-all">✏️ Editar Último</button>
                </div>
                <select id="lider" onchange="cargarEstadisticas(this.value)" class="w-full bg-slate-800/50 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-white transition-all appearance-none cursor-pointer border border-transparent hover:border-white/10">
                    <option value="">Cargando líderes...</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] text-blue-300 uppercase font-bold mb-1 ml-1">Zona</label>
                <input type="text" id="zona" placeholder="Nombre de zona" class="w-full bg-slate-800/50 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-white transition-all">
            </div>
            <div class="md:col-span-2">
                <label class="block text-[10px] text-blue-300 uppercase font-bold mb-1 ml-1">Fecha del Grupo</label>
                <input type="date" id="fecha" class="w-full bg-slate-800/50 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-white transition-all">
            </div>
        </div>

        <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-[0.2em] ml-2">Asistencia Detallada</h3>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <script>
                const config = [
                    {id: 'bautizados', label: 'Bautizados'},
                    {id: 'nuevosCreyentes', label: 'Nuevos Creyentes'},
                    {id: 'convertidos', label: 'Convertidos'},
                    {id: 'hnosEfectivos', label: 'Hnos. Efectivos'},
                    {id: 'hnosInvitados', label: 'Hnos. Invitados'},
                    {id: 'ninosCristianos', label: 'Niños Cristianos'},
                    {id: 'ninosAmigos', label: 'Niños Amigos'},
                    {id: 'adultosAmigos', label: 'Adultos Amigos'}
                ];
                document.write(config.map(c => `
                    <div class="bg-slate-900/40 p-4 rounded-2xl border border-white/5 hover:border-blue-500/30 transition-all">
                        <label class="text-[9px] text-slate-500 uppercase font-bold block mb-1">${c.label}</label>
                        <input type="number" id="${c.id}" value="0" oninput="calcularTotal()" class="w-full bg-transparent text-xl font-black outline-none" onclick="this.select()">
                    </div>
                `).join(''));
            </script>
        </div>

        <div class="bg-blue-900/30 p-6 rounded-[32px] border border-blue-500/20 mb-6 shadow-inner">
            <p class="text-center text-[10px] text-blue-300 font-black uppercase mb-1 tracking-widest">Asistencia Total General</p>
            <div id="totalGeneral" class="text-6xl font-black text-center text-white drop-shadow-xl">0</div>
        </div>

        <button onclick="enviarInforme()" id="btnGuardar" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 py-5 rounded-3xl font-black text-white shadow-[0_20px_50px_rgba(30,64,175,0.3)] active:scale-95 transition-all uppercase tracking-[0.2em] text-xs">
            🚀 Enviar Reporte al Altar
        </button>

        <div class="mt-10 pt-8 border-t border-white/10">
            <h3 class="text-xl font-black text-white uppercase tracking-tighter italic mb-4">📊 Mis Estadísticas (<span id="yearLabel"></span>)</h3>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-indigo-900/40 p-4 rounded-2xl border border-indigo-500/30 text-center">
                    <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest mb-1">Total Asistencia</p>
                    <p id="statTotal" class="text-3xl font-black text-white">0</p>
                </div>
                <div class="bg-emerald-900/40 p-4 rounded-2xl border border-emerald-500/30 text-center">
                    <p class="text-[10px] text-emerald-300 font-bold uppercase tracking-widest mb-1">Conversiones</p>
                    <p id="statConversiones" class="text-3xl font-black text-white">0</p>
                </div>
            </div>

            <h3 class="text-xs font-black text-slate-400 mb-3 uppercase tracking-[0.2em] ml-2">Mis Últimos Informes</h3>
            <div id="listaReportes" class="space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                <p class="text-center text-slate-500 text-xs py-4">Selecciona tu nombre arriba para ver tu historial.</p>
            </div>
        </div>

    </div>

    <script>
        const supabaseUrl = 'https://oowozsrtlesoxghsleyl.supabase.co';
        const supabaseKey = 'sb_publishable_6YVGWQYZf36tkrSgaW4-Ww_nTTlIM_z'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let idReporteEditando = null; 

        function calcularTotal() {
            const ids = ['bautizados', 'nuevosCreyentes', 'convertidos', 'hnosEfectivos', 'hnosInvitados', 'ninosCristianos', 'ninosAmigos', 'adultosAmigos'];
            let suma = 0;
            ids.forEach(id => { suma += Number(document.getElementById(id).value) || 0; });
            document.getElementById('totalGeneral').innerText = suma;
        }

        // 1. CARGAR LÍDERES EN EL SELECT
        async function actualizarSelectLideresReporte() {
            const select = document.getElementById('lider');
            const { data, error } = await _supabase
                .from('lideres')
                .select('*')
                .order('nombre', { ascending: true });

            if (error) {
                console.error("Error cargando líderes:", error.message);
                select.innerHTML = '<option value="">Error al cargar</option>';
                return;
            }

            if (data) {
                select.innerHTML = '<option value="">-- Selecciona tu nombre --</option>';
                data.forEach(l => {
                    const nombreFinal = l.nombre || l.lider; 
                    if (nombreFinal) {
                        select.innerHTML += `<option value="${nombreFinal}">${nombreFinal}</option>`;
                    }
                });
            }
        }

        // 2. ESTADÍSTICAS DEL AÑO ACTUAL (AHORA RECIBE EL LÍDER SELECCIONADO)
        async function cargarEstadisticas(liderSeleccionado) {
            const anioActual = new Date().getFullYear();
            document.getElementById('yearLabel').innerText = anioActual;
            
            // Si el usuario vuelve a la opción vacía "-- Selecciona tu nombre --"
            if (!liderSeleccionado) {
                document.getElementById('statTotal').innerText = "0";
                document.getElementById('statConversiones').innerText = "0";
                document.getElementById('listaReportes').innerHTML = '<p class="text-center text-slate-500 text-xs py-4">Selecciona tu nombre arriba para ver tu historial.</p>';
                return;
            }

            document.getElementById('listaReportes').innerHTML = '<p class="text-center text-slate-500 text-xs py-4">Cargando tus reportes...</p>';

            const fechaInicio = `${anioActual}-01-01`;
            const fechaFin = `${anioActual}-12-31`;

            // Filtramos específicamente por el líder seleccionado
            const { data, error } = await _supabase
                .from('reportes')
                .select('*')
                .eq('lider', liderSeleccionado) // <- Filtro clave
                .gte('fecha_reporte', fechaInicio)
                .lte('fecha_reporte', fechaFin)
                .order('fecha_reporte', { ascending: false }); 

            if (error) {
                document.getElementById('listaReportes').innerHTML = '<p class="text-red-400 text-xs text-center py-2">Error cargando historial.</p>';
                return;
            }

            let totalAsistenciaAnual = 0;
            let totalConversiones = 0;
            let htmlTabla = '';

            if (data && data.length > 0) {
                data.forEach(r => {
                    totalAsistenciaAnual += (r.total_general || 0);
                    totalConversiones += (r.convertidos || 0) + (r.nuevos_creyentes || 0);

                    let fechaObj = new Date(r.fecha_reporte);
                    fechaObj.setMinutes(fechaObj.getMinutes() + fechaObj.getTimezoneOffset());
                    let fechaCorta = fechaObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });

                    htmlTabla += `
                        <div class="bg-slate-800/40 p-3 rounded-2xl flex justify-between items-center border border-white/5 hover:border-blue-500/30 transition-all mb-2">
                            <div>
                                <span class="text-[11px] text-blue-300 font-bold uppercase">${r.lider}</span><br>
                                <span class="text-[10px] text-slate-400">📅 ${fechaCorta} | 📍 ${r.zona}</span>
                            </div>
                            <div class="bg-blue-900/50 px-3 py-1 rounded-lg border border-blue-500/20">
                                <span class="text-sm font-black text-white">${r.total_general}</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('listaReportes').innerHTML = htmlTabla;
            } else {
                document.getElementById('listaReportes').innerHTML = '<p class="text-slate-500 text-xs text-center py-4">Aún no tienes reportes registrados este año.</p>';
            }

            document.getElementById('statTotal').innerText = totalAsistenciaAnual;
            document.getElementById('statConversiones').innerText = totalConversiones;
        }

        // 3. EDITAR ÚLTIMO REPORTE DEL LÍDER
        async function editarMiUltimoReporte() {
            const liderSeleccionado = document.getElementById('lider').value;
            
            if (!liderSeleccionado) {
                alert("⚠️ Selecciona tu nombre en la lista primero para buscar tu último reporte.");
                return;
            }

            const btn = document.getElementById('btnGuardar');
            btn.innerText = "🔍 BUSCANDO...";

            const { data, error } = await _supabase
                .from('reportes')
                .select('*')
                .eq('lider', liderSeleccionado)
                .order('fecha_reporte', { ascending: false }) 
                .limit(1)
                .maybeSingle();

            if (error || !data) {
                alert(`No se encontraron reportes previos tuyos.`);
                btn.innerText = "🚀 Enviar Reporte al Altar";
                return;
            }

            idReporteEditando = data.id; 
            document.getElementById('zona').value = data.zona || '';
            document.getElementById('fecha').value = data.fecha_reporte || '';
            document.getElementById('bautizados').value = data.bautizados || 0;
            document.getElementById('nuevosCreyentes').value = data.nuevos_creyentes || 0;
            document.getElementById('convertidos').value = data.convertidos || 0;
            document.getElementById('hnosEfectivos').value = data.hnos_efectivos || 0;
            document.getElementById('hnosInvitados').value = data.hnos_invitados || 0;
            document.getElementById('ninosCristianos').value = data.ninos_cristianos || 0;
            document.getElementById('ninosAmigos').value = data.ninos_amigos || 0;
            document.getElementById('adultosAmigos').value = data.adultos_amigos || 0;
            
            calcularTotal();

            btn.innerHTML = "🔄 ACTUALIZAR REPORTE";
            btn.classList.replace('from-blue-600', 'from-yellow-600');
            btn.classList.replace('to-indigo-600', 'to-orange-600');
            btn.classList.replace('hover:from-blue-500', 'hover:from-yellow-500');
            btn.classList.replace('hover:to-indigo-500', 'hover:to-orange-500');
            
            alert(`✅ Último reporte cargado con éxito. Modifica lo que necesites y presiona Actualizar.`);
        }

        // 4. GUARDAR O ACTUALIZAR
        async function enviarInforme() {
            const btn = document.getElementById('btnGuardar');
            const liderSeleccionado = document.getElementById('lider').value;
            const fecha = document.getElementById('fecha').value;
            
            if (!liderSeleccionado || !fecha) { 
                alert("⚠️ Por favor selecciona tu nombre y la fecha del grupo."); 
                return; 
            }

            try {
                btn.disabled = true; 
                btn.innerText = idReporteEditando ? "🔄 ACTUALIZANDO..." : "🚀 GUARDANDO...";

                const datos = {
                    lider: liderSeleccionado, 
                    zona: document.getElementById('zona').value, 
                    fecha_reporte: fecha,
                    bautizados: parseInt(document.getElementById('bautizados').value) || 0,
                    nuevos_creyentes: parseInt(document.getElementById('nuevosCreyentes').value) || 0,
                    convertidos: parseInt(document.getElementById('convertidos').value) || 0,
                    hnos_efectivos: parseInt(document.getElementById('hnosEfectivos').value) || 0,
                    hnos_invitados: parseInt(document.getElementById('hnosInvitados').value) || 0,
                    ninos_cristianos: parseInt(document.getElementById('ninosCristianos').value) || 0,
                    ninos_amigos: parseInt(document.getElementById('ninosAmigos').value) || 0,
                    adultos_amigos: parseInt(document.getElementById('adultosAmigos').value) || 0,
                    total_general: parseInt(document.getElementById('totalGeneral').innerText)
                };

                if (idReporteEditando) {
                    const { error: updateError } = await _supabase
                        .from('reportes')
                        .update(datos)
                        .eq('id', idReporteEditando); 
                    
                    if (updateError) throw updateError;
                    alert("✅ ¡Gloria a Dios! El informe fue ACTUALIZADO correctamente.");
                } else {
                    const { error: insertError } = await _supabase
                        .from('reportes')
                        .insert([datos]);
                    
                    if (insertError) throw insertError;
                    alert("✅ ¡Gloria a Dios! Informe GUARDADO con éxito.");
                }

                location.reload(); 

            } catch (error) {
                alert("❌ Error: " + error.message);
                btn.disabled = false; 
                btn.innerText = idReporteEditando ? "🔄 ACTUALIZAR REPORTE" : "🚀 Enviar Reporte al Altar";
            }
        }

        // Cargar todo al iniciar la página
        window.onload = () => { 
            actualizarSelectLideresReporte();
            // Ya no llamamos cargarEstadisticas() aquí porque necesita un líder.
            // Poner la fecha de hoy por defecto para agilizar
            document.getElementById('fecha').valueAsDate = new Date();
            // Colocar el año actual en la etiqueta
            document.getElementById('yearLabel').innerText = new Date().getFullYear();
        };
    </script>
</body>
</html>
