<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuario de Dios - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; margin: 0; }

        /* FONDO DINÁMICO MEJORADO */
        .scene {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #020617; overflow: hidden;
        }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, #1e3a8a 0%, transparent 70%);
            filter: blur(80px); opacity: 0.2;
            animation: float 20s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.2); }
        }

        /* --- CONTENEDOR MAESTRO ANTI-CUADRADO --- */
        .logo-box {
            position: relative;
            width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
            /* Recorte físico circular */
            clip-path: circle(50% at 50% 50%);
            perspective: 1000px;
        }

        .logo-img {
            width: 85%; height: 85%;
            object-fit: contain;
            /* Máscara de desvanecimiento en bordes */
            -webkit-mask-image: radial-gradient(circle, black 55%, transparent 100%);
            mask-image: radial-gradient(circle, black 55%, transparent 100%);
            animation: revealLogo 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes revealLogo {
            0% { transform: scale(0.3) rotateY(90deg); filter: blur(20px) brightness(3); opacity: 0; }
            100% { transform: scale(1) rotateY(0deg); filter: blur(0) brightness(1); opacity: 1; }
        }

        /* Aura de Destello */
        .sun-flare {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(234,179,8,0.5) 0%, transparent 65%);
            border-radius: 50%;
            animation: pulseFlare 3s infinite ease-in-out;
            z-index: -1;
        }

        @keyframes pulseFlare {
            0%, 100% { transform: scale(0.9); opacity: 0.4; filter: blur(20px); }
            50% { transform: scale(1.1); opacity: 0.7; filter: blur(40px); }
        }

        /* BARRA DE PROGRESO DE ALTA PRECISIÓN */
        .loader-container {
            width: 180px; height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; overflow: hidden;
            position: relative; margin-top: 40px;
        }
        .loader-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #b45309, #fbbf24, #b45309);
            box-shadow: 0 0 15px #f59e0b;
            animation: loadProgress 3.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }

        /* CARD GLASSMORPHISM */
        .glass-ui {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform: translateY(20px);
            opacity: 0;
            transition: all 1s ease-out;
        }
        .glass-ui.active { transform: translateY(0); opacity: 1; }

        .btn-gold {
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            color: #020617;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); background: #fff; }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">
    
    <div class="scene">
        <div class="blob" style="top: -10%; left: -5%;"></div>
        <div class="blob" style="bottom: -10%; right: -5%; animation-delay: -5s; background: radial-gradient(circle, #312e81 0%, transparent 70%);"></div>
    </div>

    <div id="splash" class="fixed inset-0 z-50 bg-[#020617] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="logo-box">
            <div class="sun-flare"></div>
            <img src="https://i.postimg.cc/sxjKRBzD/Gemini_Generated_Image_sfv2elsfv2elsfv2_Photoroom.png" class="logo-img">
        </div>
        
        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
        <p class="text-[10px] text-white/20 font-bold uppercase tracking-[1em] mt-8 animate-pulse">Iniciando Portal</p>
    </div>

    <div id="login-card" class="glass-ui w-full max-w-sm text-center relative overflow-hidden">
        <div class="mb-10 relative inline-block">
            <div class="absolute inset-0 bg-yellow-500/20 blur-2xl rounded-full"></div>
            <img src="https://i.postimg.cc/sxjKRBzD/Gemini_Generated_Image_sfv2elsfv2elsfv2_Photoroom.png" 
                 class="w-28 h-28 mx-auto relative z-10 drop-shadow-2xl">
        </div>

        <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tighter">BIENVENIDO</h1>
        <p class="text-yellow-500/60 text-[10px] font-black uppercase tracking-[0.4em] mb-12">Líder Del Santuario</p>

        <div class="space-y-5">
            <div class="relative group">
                <input type="password" id="clave" placeholder="Ingrese contraseña" 
                    class="w-full p-5 rounded-3xl bg-black/40 border border-white/5 text-white text-center focus:border-yellow-500/30 outline-none transition-all placeholder:text-white/5 font-medium group-hover:bg-black/60">
            </div>
            
            <button onclick="entrar()" 
                class="btn-gold w-full p-5 rounded-3xl uppercase tracking-[0.2em] text-[11px] active:scale-95">
                Ingresar
            </button>
        </div>

        <p id="error" style="display: none;" class="text-red-500 text-[10px] mt-8 font-bold uppercase tracking-widest">
            Acceso no reconocido
        </p>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                const card = document.getElementById('login-card');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    card.classList.add('active');
                }, 1000);
            }, 3500);
        };

        function entrar() {
            const claveInput = document.getElementById('clave');
            const clave = claveInput.value;
            const errorMsg = document.getElementById('error');
            
            if (clave === "Lider2026" || clave === "Santuario2026") {
                document.body.style.overflow = "hidden";
                const splash = document.getElementById('splash');
                splash.style.display = 'flex';
                splash.style.opacity = '1';
                // Quitar transición para que aparezca instantáneamente
                splash.style.transition = 'none';
                // Forzar reflow
                splash.offsetHeight;
                // Restaurar transición (opcional)
                splash.style.transition = '';

                // Reiniciar animación del logo
                const logo = splash.querySelector('.logo-img');
                logo.style.animation = 'none';
                logo.offsetHeight; // forzar reflow
                logo.style.animation = 'revealLogo 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';

                // Reiniciar animación de la barra de progreso
                const loaderFill = splash.querySelector('.loader-fill');
                loaderFill.style.animation = 'none';
                loaderFill.offsetHeight;
                loaderFill.style.animation = 'loadProgress 3.5s cubic-bezier(0.65, 0, 0.35, 1) forwards';

                // Redirigir después de que termine la animación de la barra (3.5s)
                setTimeout(() => {
                    window.location.href = (clave === "Lider2026") ? "formulario.html" : "pastor.html";
                }, 3500);
            } else {
                errorMsg.style.display = 'block';
                claveInput.value = ""; // SE BORRA EL CONTENIDO AQUÍ
                const card = document.getElementById('login-card');
                card.animate([
                    { transform: 'scale(1)' },
                    { transform: 'scale(0.98) translateX(-5px)' },
                    { transform: 'scale(0.98) translateX(5px)' },
                    { transform: 'scale(1)' }
                ], { duration: 300 });
            }
        }

        document.getElementById('clave').addEventListener('keypress', (e) => { if (e.key === 'Enter') entrar(); });
        document.getElementById('clave').addEventListener('input', () => { document.getElementById('error').style.display = "none"; });
    </script>
</body>
</html>
